<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>測量丙級練習系統</title>
    <style>
        /* 一般模式：舒服的工程黃主題 */
        :root {
            --primary-color: #F9A825;    /* 核心工程黃 */
            --success-color: #43A047;  
            --bg-color: #FFF9C4;       /* 淺黃底色 */
            --dark-gray: #757575;      
            --card-bg: #FFFFFF;        
            --error-red: #E53935;      
            --text-main: #3E2723;      /* 深褐文字，比純黑更舒服 */
            --border-color: #FFE082;
            --tripod-color: #F57F17;
        }

        /* 護眼模式 (燕麥米 + 莫蘭迪綠) */
        body.eye-care-mode {
            --primary-color: #6B8E7B;
            --success-color: #4A6B58;  
            --bg-color: #F4F1EA;      
            --dark-gray: #A3A3A3;      
            --card-bg: #FDFDFB;        
            --error-red: #D67A7A;      
            --text-main: #4A4A4A;      
            --border-color: #EBEAE4;
            --tripod-color: #6B8E7B;
        }

        /* 基礎設定 */
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }

        body { 
            font-family: -apple-system, "Noto Sans TC", BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            color: var(--text-main);
            transition: background-color 0.3s ease; 
        }

        .container { 
            width: 100%;
            max-width: 600px; 
            background: var(--card-bg); 
            margin: 40px 10px; 
            padding: 35px 25px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(249, 168, 37, 0.15);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        @media (max-width: 480px) {
            .container { 
                margin: 0;
                border-radius: 0; 
                min-height: 100vh; 
                padding: 8vh 20px 20px 20px; 
                box-shadow: none;
            }
        }

        .hidden { display: none !important; }

        /* 標題與腳架設計 */
        .header-title {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 { 
            font-size: 20px; 
            margin: 0; 
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .highlight-text {
            font-size: 32px;
            font-weight: 900;
            color: var(--tripod-color);
            text-shadow: 1px 1px 0px white, 2px 2px 0px rgba(0,0,0,0.05);
            letter-spacing: 2px;
        }

        /* 腳架圖示 SVG */
        .tripod-icon {
            width: 28px;
            height: 28px;
            fill: var(--tripod-color);
        }

        /* 圖片樣式 */
        .q-image-container {
            text-align: center;
            margin-bottom: 20px;
            background: #fdfdfd;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .q-image-container img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }

        /* 進度與題目 */
        .progress-bar { font-size: 13px; color: var(--primary-color); font-weight: 800; margin-bottom: 15px; letter-spacing: 1px; }
        .question-text { font-size: 20px; font-weight: 600; margin-bottom: 25px; line-height: 1.6; }
        
        /* 選項樣式 */
        .option { 
            display: block;
            width: 100%; padding: 18px; margin-bottom: 15px; 
            border: 2px solid var(--border-color); border-radius: 16px; text-align: left; 
            background: var(--card-bg); font-size: 16px; cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
            font-weight: 500;
        }
        @media (hover: hover) { .option:hover { border-color: var(--primary-color); background: var(--bg-color); } }

        .option.correct { border-color: var(--success-color); background: #E8F5E9; color: var(--success-color); font-weight: bold; }
        .option.wrong { border-color: var(--error-red); background: #FFEBEE; color: var(--error-red); }

        /* 按鈕系統 */
        .nav-group { display: flex; gap: 12px; margin-top: 20px; }
        .big-btn { 
            flex: 1;
            padding: 18px; font-size: 18px; font-weight: bold; border: none; 
            border-radius: 16px; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; color: white;
            display: flex; align-items: center; justify-content: center;
        }
        .big-btn:active { transform: scale(0.97); }

        .start-btn { background: var(--primary-color); box-shadow: 0 4px 15px rgba(249, 168, 37, 0.3); }
        .bank-btn { background: var(--dark-gray); } 
        
        .theme-btn { 
            background: white;
            border: 2px solid var(--primary-color); 
            color: var(--primary-color); 
            padding: 12px 25px; 
            font-size: 14px; 
            font-weight: bold;
            border-radius: 50px;
            margin-top: 30px; 
            cursor: pointer;
            transition: all 0.2s;
        }
        
        #next-btn { background: var(--success-color); margin-top: 25px; }
        #bank-prev { background: var(--dark-gray); }
        #bank-next { background: var(--tripod-color); }
        
        .back-home { 
            width: 100%;
            padding: 14px; margin-top: 25px; border-radius: 12px; 
            border: 1px solid var(--dark-gray); background: transparent; color: var(--dark-gray); 
            cursor: pointer; font-size: 15px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <div class="header-title">
            <h1>
                <svg class="tripod-icon" viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2M12,5.84L17.07,18.21L12,15.96L6.93,18.21L12,5.84Z"/></svg>
                <span class="highlight-text">測量丙級</span>
                <svg class="tripod-icon" viewBox="0 0 24 24"><path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2M12,5.84L17.07,18.21L12,15.96L6.93,18.21L12,5.84Z"/></svg>
            </h1>
            <div style="font-weight: bold; margin-top: 5px; opacity: 0.8;">練習系統</div>
        </div>
        
        <div style="width: 100%; max-width: 320px; margin: 0 auto;">
            <button class="big-btn start-btn" onclick="initQuiz()" style="margin-bottom: 15px;">開始模擬測驗</button>
            <button class="big-btn bank-btn" onclick="showBankCategories()">題庫瀏覽模式</button>
        </div>
        
        <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌿 切換為護眼模式</button>
        <p style="color: var(--dark-gray); font-size: 12px; margin-top: 30px; letter-spacing: 1px;">專為長時間練習設計的舒適配色</p>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-bar" id="quiz-progress"></div>
        <div id="quiz-content">
            <div id="q-image-area" class="q-image-container hidden">
                <img id="q-image-src" src="" alt="題目圖示">
            </div>
            <div class="question-text" id="q-text"></div>
            <div id="q-options"></div>
        </div>
        <button id="next-btn" class="big-btn hidden" onclick="loadNextQuestion()">下一題</button>
        
        <div id="result-screen" class="hidden" style="text-align: center; padding: 40px 0;">
            <div style="font-size: 64px; margin-bottom: 20px;">🏗️</div>
            <h2 style="margin: 0; color: var(--text-main);">測驗結束</h2>
            <p id="score-text" style="font-size: 48px; font-weight: 900; color: var(--tripod-color); margin: 20px 0;"></p>
            <button class="big-btn start-btn" style="width:100%" onclick="initQuiz()">再測一次</button>
            <button class="back-home" onclick="goHome()">回首頁</button>
        </div>
    </div>

    <div id="bank-category-screen" class="hidden">
        <h2 style="text-align:center; margin-bottom: 30px;">選擇章節</h2>
        <div id="category-list" style="display: flex; flex-direction: column; gap: 12px;"></div>
        <button class="back-home" onclick="goHome()">回首頁</button>
    </div>

    <div id="bank-view-screen" class="hidden">
        <div class="progress-bar" id="bank-progress"></div>
        <div id="bank-content"></div>
        <div class="nav-group">
            <button id="bank-prev" class="big-btn" onclick="moveBank(-1)">上一題</button>
            <button id="bank-next" class="big-btn" onclick="moveBank(1)">下一題</button>
        </div>
        <button class="back-home" onclick="showBankCategories()">返回列表</button>
    </div>
</div>

<script>
    // --- 題庫資料 (維持原樣) ---
    const allQuestions = [
        {
            category: "測量基本觀念",
            question: "下列何者不屬於測量之三要素？",
            options: ["距離", "角度", "高程", "風速"],
            answer: 4,
            image: ""
        },
        {
            category: "測量基本觀念",
            question: "使用水準儀進行測量時，最主要的目的是求得兩點間的？",
            options: ["水平距離", "高程差", "方位角", "坡度"],
            answer: 2,
            image: ""
        }
    ];

    let currentQuizPool = [];
    let currentIdx = 0;
    let score = 0;

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // --- 主題切換 (邏輯改為控制 eye-care-mode) ---
    function toggleTheme() {
        const body = document.body;
        body.classList.toggle('eye-care-mode');
        const isEyeCare = body.classList.contains('eye-care-mode');
        localStorage.setItem('theme', isEyeCare ? 'eye-care' : 'normal');
        updateThemeBtn(isEyeCare);
    }

    function updateThemeBtn(isEyeCare) {
        const btn = document.getElementById('theme-btn');
        btn.innerHTML = isEyeCare ? "☀️ 切換為一般模式" : "🌿 切換為護眼模式";
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'eye-care') {
            document.body.classList.add('eye-care-mode');
            updateThemeBtn(true);
        } else {
            updateThemeBtn(false);
        }
    };

    function goHome() {
        document.getElementById('home-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('bank-category-screen').classList.add('hidden');
        document.getElementById('bank-view-screen').classList.add('hidden');
    }

    // --- 模擬測驗模式 ---
    function initQuiz() {
        if (allQuestions.length === 0) return alert("題庫暫無資料");
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-content').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        currentQuizPool = shuffle([...allQuestions]).slice(0, 20);
        currentIdx = 0;
        score = 0;
        loadQuizQuestion();
    }

    function loadQuizQuestion() {
        const q = currentQuizPool[currentIdx];
        document.getElementById('quiz-progress').innerText = `題目進度 ${currentIdx + 1} / ${currentQuizPool.length}`;
        document.getElementById('q-text').innerText = q.question;
        document.getElementById('next-btn').classList.add('hidden');
        
        const imgArea = document.getElementById('q-image-area');
        const imgTag = document.getElementById('q-image-src');
        if (q.image) {
            imgTag.src = q.image;
            imgArea.classList.remove('hidden');
        } else {
            imgArea.classList.add('hidden');
        }

        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';

        const optionObjects = q.options.map((opt, i) => ({
            text: opt,
            isCorrect: (i + 1 === q.answer)
        }));
        shuffle(optionObjects);

        optionObjects.forEach((optObj) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = optObj.text;
            btn.onclick = () => {
                const allBtns = optionsDiv.querySelectorAll('.option');
                allBtns.forEach(b => b.onclick = null);
                
                if (optObj.isCorrect) {
                    btn.classList.add('correct');
                    btn.innerText += " ✅";
                    score++;
                } else {
                    btn.classList.add('wrong');
                    btn.innerText += " ❌";
                    optionObjects.forEach((item, idx) => {
                        if (item.isCorrect) {
                            allBtns[idx].classList.add('correct');
                            allBtns[idx].innerText += " ✅";
                        }
                    });
                }
                document.getElementById('next-btn').classList.remove('hidden');
            };
            optionsDiv.appendChild(btn);
        });
    }

    function loadNextQuestion() {
        currentIdx++;
        if (currentIdx < currentQuizPool.length) {
            loadQuizQuestion();
        } else {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-text').innerText = `${Math.round((score / currentQuizPool.length) * 100)} 分`;
        }
    }

    // --- 題庫瀏覽模式 ---
    let bankPool = [];
    let bankIdx = 0;

    function showBankCategories() {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('bank-category-screen').classList.remove('hidden');
        document.getElementById('bank-view-screen').classList.add('hidden');
        
        const categories = [...new Set(allQuestions.map(q => q.category))];
        const listDiv = document.getElementById('category-list');
        listDiv.innerHTML = '';
        
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.style.textAlign = 'center';
            btn.style.borderColor = 'var(--primary-color)';
            btn.style.color = 'var(--primary-color)';
            btn.style.fontWeight = 'bold';
            btn.innerText = cat;
            btn.onclick = () => startBankView(cat);
            listDiv.appendChild(btn);
        });
    }

    function startBankView(cat) {
        bankPool = allQuestions.filter(q => q.category === cat);
        bankIdx = 0;
        document.getElementById('bank-category-screen').classList.add('hidden');
        document.getElementById('bank-view-screen').classList.remove('hidden');
        renderBankItem();
    }

    function renderBankItem() {
        const q = bankPool[bankIdx];
        document.getElementById('bank-progress').innerText = `${q.category} (${bankIdx + 1}/${bankPool.length})`;
        const content = document.getElementById('bank-content');
        
        let imgHTML = '';
        if (q.image) {
            imgHTML = `<div class="q-image-container"><img src="${q.image}"></div>`;
        }
        
        content.innerHTML = `${imgHTML}<div class="question-text">${q.question}</div>`;
        
        q.options.forEach((optText, i) => {
            const isAns = (i + 1 === q.answer);
            content.innerHTML += `<div class="option ${isAns ? 'correct' : ''}">${optText} ${isAns ? '✅' : ''}</div>`;
        });
    }

    function moveBank(step) {
        bankIdx += step;
        if (bankIdx < 0) bankIdx = 0;
        else if (bankIdx >= bankPool.length) bankIdx = bankPool.length - 1;
        renderBankItem();
    }
</script>

</body>
</html>
