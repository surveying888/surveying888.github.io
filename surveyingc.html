<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>測量丙級練習系統</title>
    <style>
        /* 預設：護眼模式 (燕麥米 + 莫蘭迪綠) */
        :root {
            --primary-color: #6B8E7B;
            --success-color: #4A6B58;  
            --bg-color: #F4F1EA;      
            --dark-gray: #A3A3A3;      
            --card-bg: #FDFDFB;        
            --error-red: #D67A7A;      
            --text-main: #4A4A4A;      
            --border-color: #EBEAE4;
        }

        /* 一般模式 (舒服工程黃) */
        body.normal-mode {
            --primary-color: #E6B422; /* 暖金黃 */
            --success-color: #B8860B;
            --bg-color: #FFFDF7; 
            --dark-gray: #8B8B8B;
            --card-bg: #ffffff;
            --error-red: #E07A5F;      
            --text-main: #3D3D3D;
            --border-color: #F2E3B6;
        }

        /* 基礎設定 */
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            color: var(--text-main);
            transition: background-color 0.3s ease; 
        }

        .container { 
            width: 100%;
            max-width: 600px; 
            background: var(--card-bg); 
            margin: 40px 10px; 
            padding: 30px 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease;
        }

        @media (max-width: 480px) {
            .container { 
                margin: 0;
                border-radius: 0; 
                min-height: 100vh; 
                padding: 6vh 20px 20px 20px; 
                box-shadow: none;
            }
        }

        .hidden { display: none !important; }

        /* 標題設計 */
        .main-title {
            text-align: center;
            margin-bottom: 40px;
            line-height: 1.2;
        }
        .main-title .highlight {
            font-size: 32px;
            font-weight: 900;
            color: var(--primary-color);
            display: block;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .main-title .sub {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
        }
        .tripod-icon {
            display: inline-block;
            vertical-align: middle;
            margin-left: 5px;
            width: 24px;
            height: 24px;
            opacity: 0.8;
        }

        /* 圖片樣式 */
        .q-image-container {
            text-align: center;
            margin-bottom: 20px;
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .q-image-container img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }

        /* 內容樣式 */
        .progress-bar { font-size: 14px; color: var(--primary-color); font-weight: 700; margin-bottom: 20px; letter-spacing: 0.5px; }
        .question-text { font-size: 19px; font-weight: 600; margin-bottom: 25px; line-height: 1.5; color: var(--text-main); }
        
        /* 選項樣式 */
        .option { 
            display: block;
            width: 100%; padding: 16px; margin-bottom: 12px; 
            border: 2px solid var(--border-color); border-radius: 12px; text-align: left; 
            background: var(--card-bg); font-size: 16px; cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
        }
        @media (hover: hover) { .option:hover { border-color: var(--primary-color); background: var(--bg-color); } }

        .option.correct { border-color: var(--primary-color); background: #FFF9E6; color: var(--success-color); font-weight: bold; }
        body.normal-mode .option.correct { background: #FFF9E6; }
        .option.wrong { border-color: var(--error-red); color: var(--error-red); }

        /* 按鈕系統 */
        .nav-group { display: flex; gap: 12px; margin-top: 20px; }
        .big-btn { 
            flex: 1;
            padding: 18px; font-size: 18px; font-weight: bold; border: none; 
            border-radius: 15px; cursor: pointer; transition: transform 0.1s, opacity 0.2s; color: white;
            display: flex; align-items: center; justify-content: center; width: 100%;
        }
        .big-btn:active { transform: scale(0.98); opacity: 0.9; }

        .start-btn { background: var(--primary-color); margin-bottom: 15px; }
        .bank-btn { background: var(--dark-gray); } 
        
        .theme-btn { 
            background: transparent;
            border: 2px solid var(--primary-color); 
            color: var(--primary-color); 
            padding: 10px 22px; 
            font-size: 14px; 
            font-weight: bold;
            border-radius: 30px;
            margin-top: 25px; 
            cursor: pointer;
            transition: all 0.2s;
        }
        
        #next-btn { background: var(--success-color); margin-top: 25px; }
        #bank-prev { background: var(--dark-gray); }
        #bank-next { background: var(--success-color); }
        
        .back-home { 
            width: 100%;
            padding: 14px; margin-top: 25px; border-radius: 10px; 
            border: 1px solid var(--dark-gray); background: transparent; color: var(--text-main); 
            cursor: pointer; font-size: 15px; font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <div class="main-title">
            <span class="highlight">測量丙級</span>
            <span class="sub">練習系統 
                <svg class="tripod-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2M12,5.84L17.14,18.25L12,15.96L6.86,18.25L12,5.84Z" />
                </svg>
            </span>
        </div>
        
        <div style="width: 85%; max-width: 300px; margin: 0 auto;">
            <button class="big-btn start-btn" onclick="initQuiz()">開始模擬測驗</button>
            <button class="big-btn bank-btn" onclick="showBankCategories()">題庫瀏覽模式</button>
        </div>
        
        <div style="text-align: center;">
            <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀️ 切換為一般模式</button>
            <p style="color: var(--dark-gray); font-size: 13px; margin-top: 25px;">系統會自動記憶您的顏色偏好設定</p>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-bar" id="quiz-progress"></div>
        <div id="quiz-content">
            <div id="q-image-area" class="q-image-container hidden">
                <img id="q-image-src" src="" alt="題目圖示">
            </div>
            <div class="question-text" id="q-text"></div>
            <div id="q-options"></div>
        </div>
        <button id="next-btn" class="big-btn hidden" onclick="loadNextQuestion()">下一題</button>
        
        <div id="result-screen" class="hidden" style="text-align: center; padding-top: 20px;">
            <div style="font-size: 60px;">🥇</div>
            <h2 style="margin-top: 15px; color: var(--text-main);">測驗結束</h2>
            <p id="score-text" style="font-size: 36px; font-weight: bold; color: var(--primary-color); margin: 15px 0;"></p>
            <button class="big-btn start-btn" style="width:100%" onclick="initQuiz()">再測一次</button>
            <button class="back-home" onclick="goHome()">回首頁</button>
        </div>
    </div>

    <div id="bank-category-screen" class="hidden">
        <h2 style="text-align:center; margin-bottom: 25px; color: var(--text-main);">選擇章節</h2>
        <div id="category-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
        <button class="back-home" onclick="goHome()">回首頁</button>
    </div>

    <div id="bank-view-screen" class="hidden">
        <div class="progress-bar" id="bank-progress"></div>
        <div id="bank-content"></div>
        <div class="nav-group">
            <button id="bank-prev" class="big-btn" onclick="moveBank(-1)">上一題</button>
            <button id="bank-next" class="big-btn" onclick="moveBank(1)">下一題</button>
        </div>
        <button class="back-home" onclick="showBankCategories()">返回列表</button>
    </div>
</div>

<script>
    // --- 題庫資料 (範例) ---
    const allQuestions = [
    {
        category: "基本學能",
        question: "我國現時土地測量所採用之長度單位為？",
        options: ["公尺", "市尺", "英尺", "台尺"],
        answer: 1,
        image: ""
    },
    {
        category: "基本學能",
        question: "市場上房屋建築面積一般以坪為單位，一坪等於？",
        options: ["3.344 ㎡", "3.3058 ㎡", "36 平方呎", "18 平方台尺"],
        answer: 2,
        image: ""
    },
    {
        category: "基本學能",
        question: "目前台灣地區使用 TM 二度分帶坐標系統，下列何者不符合此坐標系統之定義？",
        options: ["原點為中央經線與赤道交點", "中央經線尺度比率為 0.9999", "東經 121° 為中央經線", "原點之 X 坐標為 500,000 公尺"],
        answer: 4,
        image: ""
    },
    {
        category: "基本學能",
        question: "長 125m 寬 35m 之長方形土地一塊，面積為若干公頃？",
        options: ["0.4375", "4.375", "43.75", "44"],
        answer: 1,
        image: ""
    },
    {
        category: "基本學能",
        question: "土地面積換算，下列何者錯誤？",
        options: ["一公頃等於 10,000 平方公尺", "一公畝等於 100 平方公尺", "一公頃約等於 2,934 坪", "一甲約等於 0.9699 公頃"],
        answer: 3,
        image: ""
    },
    {
        category: "基本學能",
        question: "多色地圖中，水稻田使用之顏色一般為？",
        options: ["藍色", "綠色", "紅色", "黑色"],
        answer: 2,
        image: ""
    },
    {
        category: "基本學能",
        question: "地球參考橢球體之長軸半徑為 a，短軸半徑為 b，則扁率為？",
        options: ["(a+b)/a", "(a-b)/b", "(a+b)/b", "(a-b)/a"],
        answer: 4,
        image: ""
    },
    {
        category: "基本學能",
        question: "測繪 1/500 地形圖，兩點間距離實地為 70 公尺，在圖上長度應為？",
        options: ["17 公分", "10 公分", "14 公分", "20 公分"],
        answer: 3,
        image: ""
    },
    {
        category: "基本學能",
        question: "1/2000 地圖上 10cm 之實地長為？",
        options: ["12m", "200m", "20m", "2,000m"],
        answer: 2,
        image: ""
    },
    {
        category: "基本學能",
        question: "大比例尺開闊地區之細部測量常用之方法為？",
        options: ["交會法", "縱橫線法", "半導線法", "光線法"],
        answer: 4,
        image: ""
    },
    {
        category: "基本學能",
        question: "測繪 1/500 地圖，測得至某地物點之距離為 40 公尺，縮繪在圖上的距離為？",
        options: ["2 cm", "4 cm", "8 cm", "20 cm"],
        answer: 3,
        image: ""
    },
    {
        category: "基本學能",
        question: "1/2500 圖上距離 16.4mm，地上距離多少？",
        options: ["25m", "16m", "41m", "40m"],
        answer: 3,
        image: ""
    },
    {
        category: "基本學能",
        question: "若比例尺縮小 1/3，則面積之縮小率為？",
        options: ["1/3", "1/6", "1/9", "1/12"],
        answer: 3,
        image: ""
    },
    {
        category: "基本學能",
        question: "1/500 地圖圖幅大小為 30cm × 40cm，其所涵蓋之面積為？",
        options: ["3 公頃", "4 公頃", "12 公頃", "5 公頃"],
        answer: 1,
        image: ""
    },
    {
        category: "基本學能",
        question: "測量工作主要測量地球表面之？",
        options: ["地理、地系", "地系、地表", "地形、地面", "地物、地貌"],
        answer: 4,
        image: ""
    }
];
    let currentQuizPool = [];
    let currentIdx = 0;
    let score = 0;

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function toggleTheme() {
        const body = document.body;
        body.classList.toggle('normal-mode');
        const isNormal = body.classList.contains('normal-mode');
        localStorage.setItem('theme', isNormal ? 'normal' : 'eye-care');
        updateThemeBtn(isNormal);
    }

    function updateThemeBtn(isNormal) {
        const btn = document.getElementById('theme-btn');
        btn.innerHTML = isNormal ? "🌿 切換為護眼模式" : "☀️ 切換為一般模式";
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'normal') {
            document.body.classList.add('normal-mode');
            updateThemeBtn(true);
        } else {
            updateThemeBtn(false);
        }
    };

    function goHome() {
        document.getElementById('home-screen').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('bank-category-screen').classList.add('hidden');
        document.getElementById('bank-view-screen').classList.add('hidden');
    }

    function initQuiz() {
        if (allQuestions.length === 0) return alert("題庫暫無資料");
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-content').classList.remove('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        
        currentQuizPool = shuffle([...allQuestions]).slice(0, 20);
        currentIdx = 0;
        score = 0;
        loadQuizQuestion();
    }

    function loadQuizQuestion() {
        const q = currentQuizPool[currentIdx];
        document.getElementById('quiz-progress').innerText = `第 ${currentIdx + 1} 題 / 共 ${currentQuizPool.length} 題`;
        document.getElementById('q-text').innerText = q.question;
        document.getElementById('next-btn').classList.add('hidden');
        
        const imgArea = document.getElementById('q-image-area');
        const imgTag = document.getElementById('q-image-src');
        if (q.image) {
            imgTag.src = q.image;
            imgArea.classList.remove('hidden');
        } else {
            imgArea.classList.add('hidden');
        }

        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';

        const optionObjects = q.options.map((opt, i) => ({
            text: opt,
            isCorrect: (i + 1 === q.answer)
        }));
        shuffle(optionObjects);

        optionObjects.forEach((optObj) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = optObj.text;
            btn.onclick = () => {
                const allBtns = optionsDiv.querySelectorAll('.option');
                allBtns.forEach(b => b.onclick = null);
                
                if (optObj.isCorrect) {
                    btn.classList.add('correct');
                    btn.innerText += " ✅";
                    score++;
                } else {
                    btn.classList.add('wrong');
                    btn.innerText += " ❌";
                    optionObjects.forEach((item, idx) => {
                        if (item.isCorrect) {
                            allBtns[idx].classList.add('correct');
                            allBtns[idx].innerText += " ✅";
                        }
                    });
                }
                document.getElementById('next-btn').classList.remove('hidden');
            };
            optionsDiv.appendChild(btn);
        });
    }

    function loadNextQuestion() {
        currentIdx++;
        if (currentIdx < currentQuizPool.length) {
            loadQuizQuestion();
        } else {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-text').innerText = `${Math.round((score / currentQuizPool.length) * 100)} 分`;
        }
    }

    let bankPool = [];
    let bankIdx = 0;

    function showBankCategories() {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('bank-category-screen').classList.remove('hidden');
        document.getElementById('bank-view-screen').classList.add('hidden');
        
        const categories = [...new Set(allQuestions.map(q => q.category))];
        const listDiv = document.getElementById('category-list');
        listDiv.innerHTML = '';
        
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.style.textAlign = 'center';
            btn.style.borderColor = 'var(--primary-color)';
            btn.style.color = 'var(--primary-color)';
            btn.style.fontWeight = 'bold';
            btn.innerText = cat;
            btn.onclick = () => startBankView(cat);
            listDiv.appendChild(btn);
        });
    }

    function startBankView(cat) {
        bankPool = allQuestions.filter(q => q.category === cat);
        bankIdx = 0;
        document.getElementById('bank-category-screen').classList.add('hidden');
        document.getElementById('bank-view-screen').classList.remove('hidden');
        renderBankItem();
    }

    function renderBankItem() {
        const q = bankPool[bankIdx];
        document.getElementById('bank-progress').innerText = `${q.category} (${bankIdx + 1}/${bankPool.length})`;
        const content = document.getElementById('bank-content');
        
        let imgHTML = '';
        if (q.image) {
            imgHTML = `<div class="q-image-container"><img src="${q.image}"></div>`;
        }
        
        content.innerHTML = `${imgHTML}<div class="question-text">${q.question}</div>`;
        
        q.options.forEach((optText, i) => {
            const isAns = (i + 1 === q.answer);
            content.innerHTML += `<div class="option ${isAns ? 'correct' : ''}">${optText} ${isAns ? '✅' : ''}</div>`;
        });
    }

    function moveBank(step) {
        bankIdx += step;
        if (bankIdx < 0) bankIdx = 0;
        else if (bankIdx >= bankPool.length) bankIdx = bankPool.length - 1;
        renderBankItem();
    }
</script>

</body>
</html>
