<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>測量丙級練習系統</title>
    <style>
        /* --- 1. 顏色定義 --- */
        :root {
            /* 預設：護眼模式 (燕麥米 + 莫蘭迪綠) */
            --primary-color: #6B8E7B;
            --success-color: #4A6B58;  
            --bg-color: #F4F1EA;       
            --dark-gray: #A3A3A3;      
            --card-bg: #FDFDFB;        
            --error-red: #D67A7A;      
            --text-main: #4A4A4A;      
            --border-color: #EBEAE4;
        }

        /* 修改：一般模式改為舒適的黃色主題 */
        body.normal-mode {
            --primary-color: #E6A23C;  /* 溫暖琥珀黃 */
            --success-color: #B88230;  
            --bg-color: #FFF9EB;       /* 極淺鵝黃背景 */
            --dark-gray: #909399;
            --card-bg: #ffffff;
            --error-red: #F56C6C;      
            --text-main: #5E5E5E;
            --border-color: #F2E8CF;
        }

        /* --- 2. 基礎設定 --- */
        * { -webkit-tap-highlight-color: transparent; user-select: none; box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            min-height: 100vh;
            color: var(--text-main);
            transition: background-color 0.3s ease, color 0.3s ease; 
        }

        .container { 
            width: 100%;
            max-width: 600px; 
            background: var(--card-bg); 
            margin: 40px 10px; 
            padding: 30px 25px; 
            border-radius: 20px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 480px) {
            .container { margin: 0; border-radius: 0; min-height: 100vh; padding: 6vh 20px 20px 20px; box-shadow: none; }
        }

        .hidden { display: none !important; }

        /* --- 3. 標題與對齊修正 (解決歪歪的問題) --- */
        .title-group { 
            display: flex; 
            align-items: center; /* 確保垂直置中 */
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 40px; 
            width: 100%;
        }

        .tripod-icon { 
            width: 36px; 
            height: 36px; 
            fill: var(--primary-color);
            flex-shrink: 0; /* 防止圖案被擠壓 */
        }

        h1 { 
            font-size: 22px; 
            margin: 0; 
            color: var(--text-main); 
            line-height: 1.2;
            display: flex;
            align-items: center;
        }

        .highlight-text { 
            color: var(--primary-color); 
            font-weight: 900; 
            font-size: 26px; 
            text-decoration: underline; /* 使用標準底線 */
            text-underline-offset: 6px; /* 讓底線跟文字有舒服的距離 */
            margin-right: 8px;
        }

        /* --- 4. 圖片容器 --- */
        .q-image-container {
            text-align: center;
            margin-bottom: 20px;
            background: #fff;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .q-image-container img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
        }

        /* --- 5. 測驗元件樣式 --- */
        .progress-bar { font-size: 14px; color: var(--primary-color); font-weight: 700; margin-bottom: 20px; letter-spacing: 0.5px; }
        .question-text { font-size: 19px; font-weight: 600; margin-bottom: 25px; line-height: 1.5; }
        
        .option { 
            display: block; width: 100%; padding: 16px; margin-bottom: 12px; 
            border: 2px solid var(--border-color); border-radius: 12px; text-align: left; 
            background: var(--card-bg); font-size: 16px; cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-main);
        }
        .option.correct { border-color: var(--primary-color); background: #FAF3E6; color: var(--success-color); font-weight: bold; }
        body.normal-mode .option.correct { background: #FFF8E1; }
        .option.wrong { border-color: var(--error-red); color: var(--error-red); }

        .big-btn { 
            flex: 1; padding: 18px; font-size: 18px; font-weight: bold; border: none; 
            border-radius: 15px; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; width: 100%;
        }
        .start-btn { background: var(--primary-color); margin-bottom: 15px; }
        .bank-btn { background: var(--dark-gray); } 
        #next-btn { background: var(--success-color); margin-top: 25px; }

        .back-home { 
            width: 100%; padding: 14px; margin-top: 25px; border-radius: 10px; 
            border: 1px solid var(--dark-gray); background: transparent; color: var(--text-main); 
            cursor: pointer; font-size: 15px; font-weight: bold;
        }
        .nav-group { display: flex; gap: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <div class="title-group">
            <svg class="tripod-icon" viewBox="0 0 24 24">
                <path d="M12,2L14,5H10L12,2M11,6H13L14.5,15H17L18,22H16L15.5,17H8.5L8,22H6L7,15H9.5L11,6Z" />
            </svg>
            <h1><span class="highlight-text">測量丙級</span>練習系統</h1>
        </div>

        <div style="width: 85%; max-width: 300px;">
            <button class="big-btn start-btn" onclick="initQuiz()">開始模擬測驗</button>
            <button class="big-btn bank-btn" onclick="showBankCategories()">題庫瀏覽模式</button>
        </div>
        <button class="back-home" style="border-radius: 30px; border-color: var(--primary-color); color: var(--primary-color); padding: 10px 20px; width: auto;" id="theme-btn" onclick="toggleTheme()">☀️ 切換色彩主題</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress-bar" id="quiz-progress"></div>
        <div id="quiz-content">
            <div id="q-image-area" class="q-image-container hidden">
                <img id="q-image-src" src="" alt="題目圖示">
            </div>
            <div class="question-text" id="q-text"></div>
            <div id="q-options"></div>
        </div>
        <button id="next-btn" class="big-btn hidden" onclick="loadNextQuestion()">下一題</button>
        
        <div id="result-screen" class="hidden" style="text-align: center; padding-top: 20px;">
            <div style="font-size: 60px;">🏆</div>
            <h2>測驗結束</h2>
            <p id="score-text" style="font-size: 36px; font-weight: bold; color: var(--primary-color); margin: 15px 0;"></p>
            <button class="big-btn start-btn" style="width:100%" onclick="initQuiz()">再測一次</button>
            <button class="back-home" onclick="goHome()">回首頁</button>
        </div>
    </div>

    <div id="bank-category-screen" class="hidden">
        <h2 style="text-align:center; margin-bottom: 25px;">選擇章節</h2>
        <div id="category-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
        <button class="back-home" onclick="goHome()">回首頁</button>
    </div>

    <div id="bank-view-screen" class="hidden">
        <div class="progress-bar" id="bank-progress"></div>
        <div id="bank-content"></div>
        <div class="nav-group">
            <button class="big-btn" style="background: var(--dark-gray);" onclick="moveBank(-1)">上一題</button>
            <button class="big-btn" style="background: var(--success-color);" onclick="moveBank(1)">下一題</button>
        </div>
        <button class="back-home" onclick="showBankCategories()">返回列表</button>
    </div>
</div>

<script>
    // --- 邏輯功能 ---
    function toggleTheme() {
        const body = document.body;
        body.classList.toggle('normal-mode');
        const isNormal = body.classList.contains('normal-mode');
        localStorage.setItem('theme', isNormal ? 'normal' : 'eye-care');
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'normal') document.body.classList.add('normal-mode');
    };

    const allQuestions = [
      {
        category: "  01：圖說識讀",
        question: "如下圖所示，建築圖上此符號代表",
        options: ["標高", "高帽落水頭", "直徑", "弧度"],
        answer: 1,
        image: "cq16.png" 
      }
    ];

    let currentQuizPool = [];
    let currentIdx = 0;
    let score = 0;

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function goHome() { location.reload(); }

    function initQuiz() {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        currentQuizPool = shuffle([...allQuestions]).slice(0, 20);
        currentIdx = 0;
        score = 0;
        loadQuizQuestion();
    }

    function loadQuizQuestion() {
        const q = currentQuizPool[currentIdx];
        document.getElementById('quiz-progress').innerText = `題號 ${currentIdx + 1} / ${currentQuizPool.length}`;
        document.getElementById('q-text').innerText = q.question;
        document.getElementById('next-btn').classList.add('hidden');
        
        const imgArea = document.getElementById('q-image-area');
        const imgTag = document.getElementById('q-image-src');
        if (q.image) {
            imgTag.src = q.image;
            imgArea.classList.remove('hidden');
        } else {
            imgArea.classList.add('hidden');
        }

        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';
        const shuffledOptions = shuffle(q.options.map((opt, i) => ({ text: opt, isCorrect: (i + 1 === q.answer) })));

        shuffledOptions.forEach((optObj) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = optObj.text;
            btn.onclick = () => {
                const allBtns = optionsDiv.querySelectorAll('.option');
                allBtns.forEach(b => b.onclick = null);
                if (optObj.isCorrect) { btn.classList.add('correct'); btn.innerText += " ✅"; score++; }
                else { 
                    btn.classList.add('wrong'); btn.innerText += " ❌";
                    shuffledOptions.forEach((item, idx) => { if (item.isCorrect) { allBtns[idx].classList.add('correct'); allBtns[idx].innerText += " ✅"; } });
                }
                document.getElementById('next-btn').classList.remove('hidden');
            };
            optionsDiv.appendChild(btn);
        });
    }

    function loadNextQuestion() {
        currentIdx++;
        if (currentIdx < currentQuizPool.length) loadQuizQuestion();
        else {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('score-text').innerText = `${Math.round((score / currentQuizPool.length) * 100)} 分`;
        }
    }

    let bankPool = [];
    let bankIdx = 0;

    function showBankCategories() {
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('bank-category-screen').classList.remove('hidden');
        const categories = [...new Set(allQuestions.map(q => q.category))];
        const listDiv = document.getElementById('category-list');
        listDiv.innerHTML = '';
        categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.style.textAlign = 'center';
            btn.innerText = cat;
            btn.onclick = () => startBankView(cat);
            listDiv.appendChild(btn);
        });
    }

    function startBankView(cat) {
        bankPool = allQuestions.filter(q => q.category === cat);
        bankIdx = 0;
        document.getElementById('bank-category-screen').classList.add('hidden');
        document.getElementById('bank-view-screen').classList.remove('hidden');
        renderBankItem();
    }

    function renderBankItem() {
        const q = bankPool[bankIdx];
        document.getElementById('bank-progress').innerText = `${q.category} (${bankIdx + 1}/${bankPool.length})`;
        const content = document.getElementById('bank-content');
        let imgHtml = q.image ? `<div class="q-image-container"><img src="${q.image}"></div>` : '';
        content.innerHTML = `${imgHtml}<div class="question-text">${q.question}</div>`;
        q.options.forEach((opt, i) => {
            const isAns = (i + 1 === q.answer);
            content.innerHTML += `<div class="option ${isAns ? 'correct' : ''}">${opt} ${isAns ? '✅' : ''}</div>`;
        });
    }

    function moveBank(step) {
        bankIdx += step;
        if (bankIdx < 0) bankIdx = 0;
        else if (bankIdx >= bankPool.length) bankIdx = bankPool.length - 1;
        renderBankItem();
    }
</script>

</body>
</html>
